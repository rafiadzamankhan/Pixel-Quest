<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Quest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1 class="game-title">PIXEL QUEST</h1>
        <div class="stats">SCORE: <span id="scoreVal">0</span></div>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        
        <div class="controls">
            <div class="btn up" id="ctrl-Up">↑</div>
            <div class="btn left" id="ctrl-Left">←</div>
            <div class="btn down" id="ctrl-Down">↓</div>
            <div class="btn right" id="ctrl-Right">→</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
